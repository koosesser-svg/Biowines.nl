<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biowines — Winkel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F0E8;
      --dark: #1C1A16;
      --green: #3D5C3A;
      --green-light: #6B8F68;
      --stone: #C8BFA8;
      --accent: #8B4A2F;
    }
    body {
      background: var(--cream);
      color: var(--dark);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* NAV */
    nav {
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--stone);
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dark);
      text-decoration: none;
    }
    .nav-links { display: flex; gap: 2rem; align-items: center; }
    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(28,26,22,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--dark); }
    .admin-btn {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--green);
      color: var(--cream) !important;
      padding: 0.5rem 1rem;
      text-decoration: none;
      transition: background 0.2s !important;
    }
    .admin-btn:hover { background: var(--dark) !important; }

    /* SHOP HEADER */
    .shop-header {
      padding: 4rem 3rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .shop-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
    }
    .filter-bar { display: flex; gap: 1rem; }
    .filter-btn {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.5rem 1.2rem;
      border: 1px solid var(--stone);
      background: transparent;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      color: var(--dark);
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--green);
      color: var(--cream);
      border-color: var(--green);
    }

    /* PRODUCT GRID */
    .shop-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 3rem 6rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    .product-card {
      background: white;
      position: relative;
      transition: transform 0.3s ease;
    }
    .product-card:hover { transform: translateY(-4px); }

    .product-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8e0d0, #d4c9b5);
      font-size: 5rem;
      color: rgba(28,26,22,0.1);
    }

    .product-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      background: var(--green);
      color: var(--cream);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
    }

    .product-info { padding: 1.2rem; }

    .product-regio {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--green-light);
      margin-bottom: 0.4rem;
    }

    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 0.3rem;
    }

    .product-desc {
      font-size: 0.8rem;
      line-height: 1.6;
      color: rgba(28,26,22,0.55);
      margin-bottom: 1rem;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--stone);
      padding-top: 1rem;
    }

    .product-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
    }

    .bestel-btn {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--dark);
      color: var(--cream);
      border: none;
      padding: 0.6rem 1.2rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
      text-decoration: none;
    }
    .bestel-btn:hover { background: var(--green); }

    /* ADMIN PANEL */
    .admin-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(28,26,22,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .admin-overlay.open { display: flex; }

    .admin-panel {
      background: var(--cream);
      width: 90%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2.5rem;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--stone);
      padding-bottom: 1rem;
    }

    .admin-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--dark);
      line-height: 1;
    }

    .admin-list { margin-bottom: 2rem; }

    .admin-product-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(200,191,168,0.4);
      font-size: 0.85rem;
    }

    .admin-product-name { font-weight: 400; }
    .admin-product-price { color: var(--green); }

    .row-actions { display: flex; gap: 0.5rem; }

    .edit-btn, .delete-btn {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.7rem;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .edit-btn { background: var(--stone); color: var(--dark); }
    .delete-btn { background: var(--accent); color: var(--cream); }

    .admin-form h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      margin-bottom: 1.2rem;
    }

    .form-row { margin-bottom: 1rem; }

    .form-row label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(28,26,22,0.5);
      margin-bottom: 0.4rem;
    }

    .form-row input, .form-row select, .form-row textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--stone);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--dark);
      outline: none;
    }

    .form-row textarea { height: 80px; resize: vertical; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

    .save-btn {
      width: 100%;
      padding: 0.9rem;
      background: var(--green);
      color: var(--cream);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .save-btn:hover { background: var(--dark); }

    /* LOGIN */
    .login-screen {
      display: none;
      flex-direction: column;
      gap: 1rem;
    }
    .login-screen.show { display: flex; }
    .admin-form-wrap { display: block; }
    .admin-form-wrap.hidden { display: none; }

    /* EMPTY */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 6rem 2rem;
      color: rgba(28,26,22,0.4);
    }
    .empty-state p { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-style: italic; }

    /* FOOTER */
    footer {
      padding: 2rem 3rem;
      border-top: 1px solid var(--stone);
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: rgba(28,26,22,0.4);
    }

    @media (max-width: 900px) {
      .shop-grid { grid-template-columns: 1fr 1fr; padding: 2rem; }
      .shop-header { flex-direction: column; align-items: flex-start; gap: 1.5rem; padding: 3rem 2rem 1rem; }
      nav { padding: 1.2rem 2rem; }
    }
    @media (max-width: 600px) {
      .shop-grid { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Biowines</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="winkel.html" class="active">Winkel</a>
    <a href="#" class="admin-btn" onclick="openAdmin(event)">Beheer</a>
  </div>
</nav>

<div class="shop-header">
  <h1 class="shop-title">Onze wijnen</h1>
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProducts('alle', this)">Alle</button>
    <button class="filter-btn" onclick="filterProducts('rood', this)">Rood</button>
    <button class="filter-btn" onclick="filterProducts('wit', this)">Wit</button>
    <button class="filter-btn" onclick="filterProducts('rosé', this)">Rosé</button>
  </div>
</div>

<div class="shop-grid" id="productGrid"></div>

<footer>
  <span>© 2025 Biowines</span>
  <span>biowines.nl</span>
</footer>

<!-- ADMIN OVERLAY -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div class="admin-header">
      <h2 class="admin-title">Productbeheer</h2>
      <button class="close-btn" onclick="closeAdmin()">×</button>
    </div>

    <!-- LOGIN -->
    <div class="login-screen show" id="loginScreen">
      <p style="font-size:0.85rem; color:rgba(28,26,22,0.5);">Voer het beheerderswachtwoord in.</p>
      <div class="form-row">
        <label>Wachtwoord</label>
        <input type="password" id="adminPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') checkPassword()" />
      </div>
      <button class="save-btn" onclick="checkPassword()">Inloggen</button>
      <p id="loginError" style="color:var(--accent);font-size:0.8rem;display:none;">Onjuist wachtwoord.</p>
    </div>

    <!-- PANEL -->
    <div class="admin-form-wrap hidden" id="adminContent">
      <div class="admin-list" id="adminList"></div>
      <div class="admin-form">
        <h3 id="formTitle">Nieuw product toevoegen</h3>
        <input type="hidden" id="editIndex" value="-1" />
        <div class="form-grid">
          <div class="form-row">
            <label>Naam</label>
            <input type="text" id="fNaam" placeholder="Château Naturel" />
          </div>
          <div class="form-row">
            <label>Regio</label>
            <input type="text" id="fRegio" placeholder="Languedoc, Frankrijk" />
          </div>
        </div>
        <div class="form-row">
          <label>Omschrijving</label>
          <textarea id="fDesc" placeholder="Droge, fruitige rode wijn..."></textarea>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>Prijs (€)</label>
            <input type="number" id="fPrijs" placeholder="18.50" step="0.01" />
          </div>
          <div class="form-row">
            <label>Type</label>
            <select id="fType">
              <option value="rood">Rood</option>
              <option value="wit">Wit</option>
              <option value="rosé">Rosé</option>
            </select>
          </div>
        </div>
        <button class="save-btn" onclick="saveProduct()">Product opslaan</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── CONFIG ──────────────────────────────────────────
  const ADMIN_PASSWORD = 'biowines2025'; // Verander dit
  const BESTEL_EMAIL   = 'koosesser@gmail.com'; // Verander dit

  // ── DATA ────────────────────────────────────────────
  const defaultProducts = [
    { naam: 'Vino A', regio: 'Regio onbekend', desc: 'Omschrijving volgt.', prijs: 0.00, type: 'rood' },
    { naam: 'Vino B', regio: 'Regio onbekend', desc: 'Omschrijving volgt.', prijs: 0.00, type: 'rood' },
    { naam: 'Vino C', regio: 'Regio onbekend', desc: 'Omschrijving volgt.', prijs: 0.00, type: 'wit' },
    { naam: 'Vino D', regio: 'Regio onbekend', desc: 'Omschrijving volgt.', prijs: 0.00, type: 'wit' },
    { naam: 'Vino E', regio: 'Regio onbekend', desc: 'Omschrijving volgt.', prijs: 0.00, type: 'rosé' },
    { naam: 'Vino F', regio: 'Regio onbekend', desc: 'Omschrijving volgt.', prijs: 0.00, type: 'rosé' },
  ];

  let products = JSON.parse(localStorage.getItem('biowines_products') || 'null') || defaultProducts;
  let currentFilter = 'alle';

  function saveToStorage() {
    localStorage.setItem('biowines_products', JSON.stringify(products));
  }

  // ── RENDER SHOP ─────────────────────────────────────
  function renderShop() {
    const grid = document.getElementById('productGrid');
    const filtered = currentFilter === 'alle' ? products : products.filter(p => p.type === currentFilter);
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="empty-state"><p>Geen wijnen gevonden in deze categorie.</p></div>';
      return;
    }
    grid.innerHTML = filtered.map((p, i) => {
      const emoji = p.type === 'rood' ? '🍷' : p.type === 'wit' ? '🥂' : '🌸';
      const realIndex = products.indexOf(p);
      const subject = encodeURIComponent(`Bestelling: ${p.naam}`);
      const body = encodeURIComponent(`Hallo,\n\nIk wil graag een fles ${p.naam} (${p.regio}) bestellen.\nPrijs: €${p.prijs.toFixed(2)}\n\nMijn naam:\nMijn adres:\nTelefoonnummer:`);
      return `
        <div class="product-card">
          <div class="product-img">${emoji}</div>
          <div class="product-badge">${p.type}</div>
          <div class="product-info">
            <div class="product-regio">${p.regio}</div>
            <h3 class="product-name">${p.naam}</h3>
            <p class="product-desc">${p.desc}</p>
            <div class="product-footer">
              <span class="product-price">€${p.prijs.toFixed(2)}</span>
              <a class="bestel-btn" href="mailto:${BESTEL_EMAIL}?subject=${subject}&body=${body}">Bestel</a>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function filterProducts(type, btn) {
    currentFilter = type;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Toegangscontrole actief op live site
  const user = JSON.parse(localStorage.getItem('biowines_user') || 'null');
  if (user) {
    const welkom = document.createElement('span');
    welkom.style.cssText = 'font-size:0.75rem;color:rgba(28,26,22,0.5);letter-spacing:0.05em;';
    welkom.textContent = 'Welkom, ' + user.voornaam;
    document.querySelector('.nav-links').prepend(welkom);
  }

  renderShop();
  }

  // ── ADMIN ────────────────────────────────────────────
  function openAdmin(e) {
    e.preventDefault();
    document.getElementById('adminOverlay').classList.add('open');
  }

  function closeAdmin() {
    document.getElementById('adminOverlay').classList.remove('open');
  }

  function checkPassword() {
    const pw = document.getElementById('adminPassword').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').classList.remove('show');
      document.getElementById('adminContent').classList.remove('hidden');
      renderAdminList();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  function renderAdminList() {
    const list = document.getElementById('adminList');
    if (products.length === 0) {
      list.innerHTML = '<p style="font-size:0.85rem;color:rgba(28,26,22,0.4);margin-bottom:1.5rem;">Nog geen producten.</p>';
      return;
    }
    list.innerHTML = products.map((p, i) => `
      <div class="admin-product-row">
        <span class="admin-product-name">${p.naam}</span>
        <span class="admin-product-price">€${p.prijs.toFixed(2)}</span>
        <div class="row-actions">
          <button class="edit-btn" onclick="editProduct(${i})">Bewerk</button>
          <button class="delete-btn" onclick="deleteProduct(${i})">Verwijder</button>
        </div>
      </div>`).join('');
  }

  function editProduct(i) {
    const p = products[i];
    document.getElementById('editIndex').value = i;
    document.getElementById('fNaam').value = p.naam;
    document.getElementById('fRegio').value = p.regio;
    document.getElementById('fDesc').value = p.desc;
    document.getElementById('fPrijs').value = p.prijs;
    document.getElementById('fType').value = p.type;
    document.getElementById('formTitle').textContent = 'Product bewerken';
  }

  function deleteProduct(i) {
    if (confirm(`"${products[i].naam}" verwijderen?`)) {
      products.splice(i, 1);
      saveToStorage();
      renderAdminList();
      renderShop();
    }
  }

  function saveProduct() {
    const naam  = document.getElementById('fNaam').value.trim();
    const regio = document.getElementById('fRegio').value.trim();
    const desc  = document.getElementById('fDesc').value.trim();
    const prijs = parseFloat(document.getElementById('fPrijs').value);
    const type  = document.getElementById('fType').value;
    const idx   = parseInt(document.getElementById('editIndex').value);

    if (!naam || !regio || !prijs) { alert('Vul naam, regio en prijs in.'); return; }

    const product = { naam, regio, desc, prijs, type };
    if (idx === -1) {
      products.push(product);
    } else {
      products[idx] = product;
      document.getElementById('editIndex').value = -1;
      document.getElementById('formTitle').textContent = 'Nieuw product toevoegen';
    }

    saveToStorage();
    renderAdminList();
    renderShop();

    // Reset form
    ['fNaam','fRegio','fDesc','fPrijs'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fType').value = 'rood';
  }

  // Close on overlay click
  document.getElementById('adminOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeAdmin();
  });

  // Toegangscontrole actief op live site
  const user = JSON.parse(localStorage.getItem('biowines_user') || 'null');
  if (user) {
    const welkom = document.createElement('span');
    welkom.style.cssText = 'font-size:0.75rem;color:rgba(28,26,22,0.5);letter-spacing:0.05em;';
    welkom.textContent = 'Welkom, ' + user.voornaam;
    document.querySelector('.nav-links').prepend(welkom);
  }

  renderShop();
</script>
</body>
</html>
